<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claine | Galaxy Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-deep: #000000;
      --text-main: #ffffff;
      --text-muted: #888888;
      --accent: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-deep);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- GALAXY LAYERS --- */
    .galaxy-container {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    }

    .star-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: transparent;
    }

    /* Generating stars using box-shadow for performance */
    .stars-small { width: 1px; height: 1px; box-shadow: 454px 104px #FFF , 184px 304px #FFF; animation: starsAnim 50s linear infinite; }
    .stars-med { width: 2px; height: 2px; box-shadow: 120px 40px #FFF , 900px 500px #FFF; animation: starsAnim 100s linear infinite; }

    @keyframes starsAnim {
      from { transform: translateY(0px); }
      to { transform: translateY(-2000px); }
    }

    /* Shooting Star */
    .shooting-star {
      position: absolute;
      top: 50%; left: 50%;
      width: 2px; height: 2px;
      background: white;
      opacity: 0;
      animation: shoot 10s linear infinite;
    }

    @keyframes shoot {
      0% { transform: translateX(0) translateY(0); opacity: 0; }
      10% { opacity: 1; }
      20% { transform: translateX(-500px) translateY(500px); opacity: 0; }
      100% { opacity: 0; }
    }

    /* --- TYPING ANIMATION --- */
    .typing-text {
      display: inline-block;
      overflow: hidden;
      border-right: 3px solid #fff;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .15em;
      animation: typing 2s steps(10, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: white; } }

    /* --- NAVIGATION --- */
    nav {
      position: fixed;
      top: 0; width: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
      padding: 1rem;
      display: flex; justify-content: center; gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.4rem; cursor: pointer;
      width: 50px; height: 50px; border-radius: 50%;
      transition: 0.4s; display: flex; align-items: center; justify-content: center;
    }

    .nav-btn:hover, .nav-btn.active {
      color: #fff; background: rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
      transform: scale(1.1);
    }

    /* --- SECTIONS --- */
    main { position: relative; width: 100%; height: 100vh; }

    section {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 6rem 2rem; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      opacity: 0; visibility: hidden;
      transform: translateY(20px) scale(0.95);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    section.active-section {
      opacity: 1; visibility: visible; transform: translateY(0) scale(1);
    }

    /* --- CARDS & IMAGES --- */
    .card {
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px; width: 300px; overflow: hidden; transition: 0.4s;
    }

    .card:hover { border-color: #fff; transform: translateY(-10px); }

    .img-box { width: 100%; height: 180px; overflow: hidden; background: #000; }
    .img-box img { 
      width: 100%; height: 100%; object-fit: cover; 
      filter: grayscale(100%); transition: 0.6s;
    }
    .card:hover .img-box img { filter: grayscale(0%); transform: scale(1.1); }

    .title { font-family: 'Poppins'; font-size: 3rem; text-transform: uppercase; margin-bottom: 10px; }
    .btn { 
      margin-top: 15px; padding: 10px 25px; background: #fff; color: #000; 
      text-decoration: none; border-radius: 30px; font-weight: 600; display: inline-block;
    }
    .btn:hover { box-shadow: 0 0 20px #fff; }

  </style>
</head>
<body>

  <div class="galaxy-container">
    <div class="star-layer stars-small" id="stars1"></div>
    <div class="star-layer stars-med" id="stars2"></div>
    <div class="shooting-star"></div>
  </div>

  <nav id="navbar">
    <button class="nav-btn active" onclick="switchSection('sec-1', this)"><i class="fa-solid fa-house"></i></button>
    <button class="nav-btn" onclick="switchSection('sec-2', this)"><i class="fa-solid fa-user-astronaut"></i></button>
    <button class="nav-btn" onclick="switchSection('sec-3', this)"><i class="fa-solid fa-gamepad"></i></button>
    <button class="nav-btn" onclick="switchSection('sec-4', this)"><i class="fa-brands fa-youtube"></i></button>
    <button class="nav-btn" onclick="switchSection('sec-5', this)"><i class="fa-brands fa-github"></i></button>
    <button class="nav-btn" onclick="switchSection('sec-6', this)"><i class="fa-solid fa-bolt"></i></button>
  </nav>

  <main>
    <section id="sec-1" class="active-section">
      <h1 class="title"><span class="typing-text">CLAINE</span></h1>
      <p style="color: #888;">Student & Web Developer</p>
    </section>

    <section id="sec-2">
      <h2 class="title" style="font-size: 2rem;">About Me</h2>
      <div style="display:flex; gap:15px; flex-wrap:wrap; justify-content:center;">
        <div class="card" style="padding:20px;">
          <h3>Hobbies</h3>
          <p style="color:#888;">Gaming • Reading • Music</p>
        </div>
        <div class="card" style="padding:20px;">
          <h3>Goal</h3>
          <p style="color:#888;">Graduate & Support my family</p>
        </div>
      </div>
    </section>

    <section id="sec-3">
      <div class="card">
        <div class="img-box"><img src="images/pic02.jpg" alt="GDevelop"></div>
        <div style="padding:15px;">
          <h3>GDevelop</h3>
          <a href="https://gd.games/games/6d9ac45b-3c74-42bd-abdd-4529e874b4f0" target="_blank" class="btn">Play Game</a>
        </div>
      </div>
    </section>

    <section id="sec-4">
      <div class="card">
        <div class="img-box"><img src="images/pic03.jpg" alt="YouTube"></div>
        <div style="padding:15px;">
          <h3>YouTube</h3>
          <a href="https://youtube.com/@hotdogpandesal-gaming" target="_blank" class="btn">Subscribe</a>
        </div>
      </div>
    </section>

    <section id="sec-5">
      <div class="card">
        <div class="img-box"><img src="images/pic04.jpg" alt="GitHub"></div>
        <div style="padding:15px;">
          <h3>GitHub</h3>
          <a href="https://github.com/Clainesemania" target="_blank" class="btn">View Repo</a>
        </div>
      </div>
    </section>

    <section id="sec-6">
      <h2 class="title" style="font-size: 2rem;">Still Improving</h2>
      <p style="opacity: 0.6;">Work in progress... © Claine</p>
    </section>
  </main>

  <script>
    // 1. GENERATE STARFIELD (Pure CSS box-shadow generation)
    function generateStars(id, count) {
      let stars = "";
      for (let i = 0; i < count; i++) {
        stars += `${Math.random() * 2000}px ${Math.random() * 2000}px #FFF, `;
      }
      document.getElementById(id).style.boxShadow = stars.slice(0, -2);
    }
    generateStars('stars1', 700);
    generateStars('stars2', 200);

    // 2. TECH CLICK SOUND (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBlip() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // 3. SECTION SWITCHER
    function switchSection(id, btn) {
      playBlip(); // Play sound
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
      document.getElementById(id).classList.add('active-section');
    }
  </script>
</body>
</html>
