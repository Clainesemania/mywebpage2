<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#09090e"/>
<title>Claine — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#09090e;
  --card:#111119;
  --line:rgba(255,255,255,.07);
  --gold:#c9a96e;
  --g2:#e8cfa0;
  --txt:#dde2ec;
  --mut:#5a5f72;
  --r:14px;
  /* 120Hz-tuned easing curves */
  --spring:cubic-bezier(.16,1,.3,1);
  --snappy:cubic-bezier(.34,1.3,.64,1);
  --out:cubic-bezier(.25,.46,.45,.94);
  --in:cubic-bezier(.55,0,1,.45);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}

html{
  font-size:16px;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}

body{
  width:100%;
  height:100dvh;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  color:var(--txt);
  font-family:'Outfit','Segoe UI',system-ui,-apple-system,sans-serif;
  font-weight:300;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;
  touch-action:none;
}

/* ── BACKGROUND ── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 30%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,#000 30%,transparent 100%);
}
.orb{
  position:absolute;border-radius:50%;filter:blur(90px);
  will-change:transform;
  animation:drift 22s ease-in-out infinite alternate;
}
.o1{width:min(560px,80vw);height:min(560px,80vw);background:radial-gradient(circle,rgba(201,169,110,.18) 0%,transparent 70%);top:-15%;right:-5%;animation-duration:18s}
.o2{width:min(400px,60vw);height:min(400px,60vw);background:radial-gradient(circle,rgba(100,140,220,.10) 0%,transparent 70%);bottom:8%;left:-8%;animation-duration:26s;animation-delay:-10s}
.o3{width:min(280px,45vw);height:min(280px,45vw);background:radial-gradient(circle,rgba(201,169,110,.06) 0%,transparent 70%);top:42%;left:36%;animation-duration:34s;animation-delay:-18s}
@keyframes drift{
  0%  {transform:translate3d(0,0,0) scale(1)}
  50% {transform:translate3d(30px,-25px,0) scale(1.05)}
  100%{transform:translate3d(-15px,40px,0) scale(.97)}
}
.bg-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.05}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  padding:clamp(12px,2.5vw,20px) clamp(16px,5vw,56px);
  padding-top:calc(clamp(12px,2.5vw,20px) + var(--sat));
  display:flex;justify-content:space-between;align-items:center;
  transition:background .35s var(--out),border-color .35s var(--out);
  border-bottom:1px solid transparent;
}
nav.on{
  background:rgba(9,9,14,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-color:var(--line);
}
.n-brand{
  font-family:'Cormorant Garamond','Georgia',serif;
  font-size:clamp(1.2rem,3.5vw,1.45rem);
  font-weight:400;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);text-decoration:none;cursor:pointer;flex-shrink:0;
}
.n-links{display:flex;gap:clamp(16px,3vw,28px);list-style:none}
.n-links a{
  text-decoration:none;color:var(--mut);
  font-size:clamp(.6rem,.9vw,.7rem);font-weight:500;
  letter-spacing:.17em;text-transform:uppercase;
  transition:color .15s var(--out);
  position:relative;cursor:pointer;white-space:nowrap;
}
.n-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;
  width:0;height:1px;background:var(--gold);
  transition:width .22s var(--spring);
  will-change:width;
}
.n-links a:hover,.n-links a.active{color:var(--g2)}
.n-links a:hover::after,.n-links a.active::after{width:100%}

/* ── HAMBURGER ── */
.burger{
  display:none;
  flex-direction:column;justify-content:center;align-items:center;
  gap:5px;width:40px;height:40px;
  background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;
}
.burger span{
  display:block;width:22px;height:1.5px;
  background:var(--mut);border-radius:2px;
  will-change:transform;
  transition:transform .28s var(--spring),opacity .18s,background .15s;
}
.burger:hover span{background:var(--gold)}
.burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

/* ── MOBILE MENU ── */
.mobile-menu{
  position:fixed;inset:0;z-index:800;
  background:rgba(9,9,14,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(22px,5vw,32px);
  opacity:0;pointer-events:none;
  will-change:opacity;
  transition:opacity .28s var(--out);
}
.mobile-menu.open{opacity:1;pointer-events:all}
.mobile-menu a{
  font-family:'Cormorant Garamond','Georgia',serif;
  font-size:clamp(2rem,8vw,3rem);font-weight:300;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--mut);text-decoration:none;cursor:pointer;
  will-change:transform;
  transition:color .15s var(--out),transform .2s var(--snappy);
}
.mobile-menu a:hover,.mobile-menu a.active{color:var(--gold);transform:translate3d(8px,0,0)}

/* ── DOTS ── */
.dots{
  position:fixed;right:clamp(10px,3vw,28px);top:50%;
  transform:translateY(-50%);z-index:900;
  display:flex;flex-direction:column;gap:10px;
}
.dot-btn{
  width:7px;height:7px;border-radius:50%;
  background:var(--mut);border:none;cursor:pointer;
  padding:0;flex-shrink:0;
  will-change:transform;
  transition:background .18s var(--out),transform .22s var(--snappy);
}
.dot-btn.active{background:var(--gold);transform:scale(1.5)}
@media(max-width:360px){.dots{display:none}}

/* ══════════════════════════════════════════
   FULLPAGE SECTIONS — 90/120Hz optimised
   ONLY opacity + transform are animated.
   Both are GPU-composited — zero layout/paint.
══════════════════════════════════════════ */
.page{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  /* hidden state */
  opacity:0;
  pointer-events:none;
  transform:translate3d(0,22px,0);
  /* enter transition */
  transition:opacity .42s var(--spring), transform .42s var(--spring);
  will-change:transform,opacity;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
/* Prevent invisible flash on first load */
.page.active { opacity:1; pointer-events:all; transform:translate3d(0,0,0); }
/* EXIT going forward (slide up) */
.page.exit-up{
  opacity:0;
  transform:translate3d(0,-22px,0);
  pointer-events:none;
  transition:opacity .28s var(--in), transform .28s var(--in);
}
/* EXIT going back (slide down) */
.page.exit-down{
  opacity:0;
  transform:translate3d(0,22px,0);
  pointer-events:none;
  transition:opacity .28s var(--in), transform .28s var(--in);
}

/* ── WRAP ── */
.wrap{
  width:100%;max-width:1060px;
  padding:clamp(80px,10vh,120px) clamp(20px,6vw,56px) clamp(60px,8vh,100px);
  padding-top:calc(clamp(80px,10vh,120px) + var(--sat));
  padding-bottom:calc(clamp(60px,8vh,100px) + var(--sab));
  padding-left:calc(clamp(20px,6vw,56px) + var(--sal));
  padding-right:calc(clamp(20px,6vw,56px) + var(--sar));
  margin:0 auto;
}

/* ── TYPOGRAPHY ── */
.eyebrow{
  font-size:clamp(.6rem,.8vw,.67rem);font-weight:500;
  letter-spacing:.24em;text-transform:uppercase;
  color:var(--gold);margin-bottom:clamp(10px,2vw,16px);
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:'';display:inline-block;width:22px;height:1px;background:var(--gold);opacity:.5;flex-shrink:0}
.h2{
  font-family:'Cormorant Garamond','Georgia',serif;
  font-weight:300;line-height:1.1;
  font-size:clamp(2rem,5vw,3.8rem);
  letter-spacing:-.01em;margin-bottom:clamp(14px,2.5vw,20px);
}
.h2 em{font-style:italic;color:var(--g2)}

/* ══ S1 HERO ══ */
#s1{text-align:center}
#s1 .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%}
.hello-tag{font-size:clamp(.65rem,1.5vw,.75rem);letter-spacing:.35em;text-transform:uppercase;color:var(--mut);margin-bottom:clamp(10px,2vw,16px)}
.hero-name{
  font-family:'Cormorant Garamond','Georgia',serif;
  font-weight:700;font-size:clamp(4.5rem,18vw,12rem);
  line-height:.88;letter-spacing:-.02em;
  background:linear-gradient(150deg,var(--g2) 0%,var(--gold) 55%,#7a5c2a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-rule{width:1px;height:clamp(36px,5vh,52px);background:linear-gradient(to bottom,var(--gold),transparent);margin:clamp(20px,3vh,32px) auto}
.hero-sub{font-size:clamp(.72rem,1.5vw,.83rem);letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}

/* ══ S2 ABOUT ══ */
#s2 .layout{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,6vw,72px);align-items:start}
.about-bio p{color:rgba(221,226,236,.68);font-size:clamp(.85rem,1.2vw,.95rem);margin-bottom:clamp(10px,1.8vw,16px);line-height:1.9}
.about-bio p:first-of-type{font-size:clamp(.9rem,1.4vw,1.05rem);color:var(--txt)}
.cards{display:flex;flex-direction:column;gap:clamp(10px,1.5vw,14px)}
.ic{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);
  padding:clamp(16px,2.5vw,22px) clamp(18px,3vw,24px);
  display:flex;align-items:flex-start;gap:clamp(12px,1.8vw,15px);
  position:relative;overflow:hidden;
  will-change:transform;
  transition:border-color .18s var(--out),transform .22s var(--snappy);
}
.ic::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--gold),transparent);opacity:0;transition:opacity .18s var(--out)}
.ic:hover{border-color:rgba(201,169,110,.3);transform:translate3d(5px,0,0)}
.ic:hover::before{opacity:1}
.ic-ico{width:clamp(34px,4vw,40px);height:clamp(34px,4vw,40px);flex-shrink:0;background:rgba(201,169,110,.07);border:1px solid rgba(201,169,110,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold)}
.ic-ico svg{width:clamp(16px,2vw,19px);height:clamp(16px,2vw,19px);fill:currentColor}
.ic-body h4{font-family:'Cormorant Garamond','Georgia',serif;font-size:clamp(.88rem,1.2vw,.96rem);font-weight:600;color:var(--g2);margin-bottom:2px;letter-spacing:.04em}
.ic-body p{font-size:clamp(.75rem,1vw,.8rem);color:var(--mut)}

/* ══ PROJECT SECTIONS ══ */
.proj-layout{display:grid;grid-template-columns:1fr 1fr;gap:clamp(32px,6vw,72px);align-items:center}
.proj-layout.flip{direction:rtl}
.proj-layout.flip>*{direction:ltr}
.pnum{font-size:clamp(.6rem,.8vw,.67rem);font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:clamp(8px,1.5vw,10px)}
.ptitle{font-family:'Cormorant Garamond','Georgia',serif;font-weight:700;font-size:clamp(2rem,4.5vw,3.8rem);line-height:.95;letter-spacing:-.02em;margin-bottom:clamp(12px,2vw,16px)}
.ptitle em{font-style:italic;color:var(--g2)}
.pdesc{color:rgba(221,226,236,.62);font-size:clamp(.82rem,1.1vw,.88rem);line-height:1.9;margin-bottom:clamp(18px,3vw,26px)}
.pdesc strong{color:var(--txt);font-weight:500}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:clamp(18px,3vw,26px)}
.tag{font-size:clamp(.58rem,.75vw,.62rem);font-weight:500;letter-spacing:.11em;text-transform:uppercase;color:var(--gold);background:rgba(201,169,110,.07);border:1px solid rgba(201,169,110,.16);padding:4px 11px;border-radius:100px;display:flex;align-items:center;gap:5px}
.tag svg{width:10px;height:10px;fill:currentColor}
.btn{
  display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  font-size:clamp(.68rem,.9vw,.73rem);font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:#09090e;background:var(--gold);
  padding:clamp(10px,1.5vw,12px) clamp(20px,3vw,26px);
  border-radius:8px;min-height:44px;
  will-change:transform;
  transition:background .14s var(--out),transform .2s var(--snappy),box-shadow .18s var(--out);
}
.btn:hover,.btn:active{background:var(--g2);transform:translate3d(0,-3px,0);box-shadow:0 10px 30px rgba(201,169,110,.22)}
.btn svg{width:14px;height:14px;fill:currentColor}

/* ── IMAGE BOX ── */
.pv{position:relative}
.pframe{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:var(--card);aspect-ratio:16/10;position:relative;cursor:pointer;transition:border-color .18s var(--out)}
.pframe:hover{border-color:rgba(201,169,110,.4)}
.pframe img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;opacity:0;pointer-events:none;will-change:opacity;transition:opacity .32s var(--out)}
.pframe img.loaded{opacity:1}
.poverlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(9,9,14,.6) 0%,transparent 55%);pointer-events:none;z-index:2}
.upload-hint{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;will-change:opacity;transition:opacity .18s var(--out)}
.upload-hint .main-icon svg{width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px);fill:rgba(201,169,110,.2);will-change:transform;animation:floatY 3.5s ease-in-out infinite}
.upload-hint .up-row{display:flex;align-items:center;gap:7px}
.upload-hint .up-row svg{width:18px;height:18px;fill:rgba(201,169,110,.55)}
.upload-hint span{font-size:clamp(.62rem,.8vw,.7rem);letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
@keyframes floatY{0%,100%{transform:translate3d(0,0,0)}50%{transform:translate3d(0,-10px,0)}}
.pframe.has-img .upload-hint{opacity:0}
.pframe.has-img:hover .upload-hint{opacity:1}
.pframe input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:10;width:100%;height:100%;font-size:0}
.pv::before{content:'';position:absolute;top:-10px;right:-10px;width:50px;height:50px;border-top:1px solid rgba(201,169,110,.3);border-right:1px solid rgba(201,169,110,.3);border-radius:0 var(--r) 0 0;pointer-events:none}
.pv::after{content:'';position:absolute;bottom:-10px;left:-10px;width:50px;height:50px;border-bottom:1px solid rgba(201,169,110,.18);border-left:1px solid rgba(201,169,110,.18);border-radius:0 0 0 var(--r);pointer-events:none}

/* section tints */
#s3{background:radial-gradient(ellipse 60% 55% at 78% 50%,rgba(201,169,110,.03) 0%,transparent 70%)}
#s4{background:radial-gradient(ellipse 60% 55% at 22% 50%,rgba(100,140,220,.03) 0%,transparent 70%)}
#s5{background:radial-gradient(ellipse 60% 55% at 78% 50%,rgba(201,169,110,.025) 0%,transparent 70%)}

/* ══ S6 ══ */
#s6{text-align:center}
#s6 .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%}
.s6-tag{font-size:clamp(.62rem,1vw,.7rem);letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin-bottom:clamp(14px,2.5vw,20px)}
.s6-heading{font-family:'Cormorant Garamond','Georgia',serif;font-weight:300;font-size:clamp(2.6rem,8vw,5.5rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:clamp(20px,3.5vw,30px)}
.s6-heading em{font-style:italic;color:var(--gold)}
.s6-rule{width:60px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto clamp(18px,3vw,26px)}
.s6-sub{color:var(--mut);font-size:clamp(.82rem,1.2vw,.9rem);max-width:min(440px,88vw);line-height:1.85;margin-bottom:clamp(28px,4vw,40px)}
.s6-links{display:flex;gap:clamp(10px,1.8vw,14px);justify-content:center;flex-wrap:wrap}
.s6-link{
  display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  border:1px solid var(--line);color:var(--mut);
  padding:clamp(9px,1.5vw,11px) clamp(18px,2.5vw,22px);
  border-radius:8px;font-size:clamp(.68rem,.9vw,.72rem);font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;min-height:44px;
  will-change:transform;
  transition:border-color .15s var(--out),color .15s var(--out),transform .2s var(--snappy);
}
.s6-link:hover,.s6-link:active{border-color:var(--gold);color:var(--g2);transform:translate3d(0,-2px,0)}
.s6-link svg{width:14px;height:14px;fill:currentColor}
.s6-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:clamp(.68rem,.9vw,.76rem);color:var(--mut);margin-top:clamp(16px,3vw,22px)}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;will-change:box-shadow;animation:pdot 2.5s ease-in-out infinite}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,.5)}50%{box-shadow:0 0 0 6px rgba(201,169,110,0)}}

/* ── RESPONSIVE ── */
@media(max-width:860px){
  .n-links{display:none}
  .burger{display:flex}
  #s2 .layout,.proj-layout,.proj-layout.flip{grid-template-columns:1fr;gap:clamp(28px,5vw,40px);direction:ltr}
  .proj-layout .pv{order:2}
  .proj-layout>div:not(.pv){order:1}
}
@media(max-width:480px){
  .hero-name{font-size:clamp(3.8rem,20vw,5rem)}
  .dots{right:10px}
  .dot-btn{width:6px;height:6px}
  .pv::before,.pv::after{display:none}
  .tags{gap:5px}
  .tag{font-size:.6rem;padding:3px 9px}
}
@media(max-height:500px) and (orientation:landscape){
  .wrap{padding-top:clamp(60px,8vh,80px);padding-bottom:clamp(40px,5vh,60px)}
  #s1 .wrap,#s6 .wrap{padding-top:70px}
  .hero-name{font-size:clamp(3rem,12vh,5rem)}
  .hero-rule{height:28px;margin:16px auto}
  .s6-heading{font-size:clamp(2rem,10vh,3.5rem)}
  #s2 .layout{grid-template-columns:1fr 1fr;gap:24px}
  .proj-layout{grid-template-columns:1fr 1fr;gap:24px}
  .proj-layout.flip{direction:rtl}
  .proj-layout .pv{order:unset}
  .proj-layout>div:not(.pv){order:unset}
  .cards{gap:8px}
  .ic{padding:12px 16px}
}
/* Respect reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
  .page,.page.exit-up,.page.exit-down{transform:none!important}
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <svg class="bg-svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
